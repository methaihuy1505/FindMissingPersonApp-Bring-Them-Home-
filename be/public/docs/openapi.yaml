                    sighting_date: '2026-03-01'
                    created_at: '2026-03-31 12:44:39'
                    updated_at: '2026-03-31 12:44:39'
                    reporter:
                      id: 10
                      name: a
                      email: admin@test.com
                      phone: '123'
                      role: admin
                      created_at: '2026-03-31 08:53:17'
                      updated_at: null
