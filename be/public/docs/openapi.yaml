                    location: 'quận 8'
                    description: 'gần cầu chà và'
                    sighting_date: '2026-03-29'
                    created_at: '2026-03-31 10:20:19'
                    updated_at: '2026-03-31 10:20:19'
                    reporter:
                      id: 10
                      name: a
                      email: admin@test.com
                      phone: '123'
                      role: admin
                      created_at: '2026-03-31 08:53:17'
                      updated_at: null
