        - 'Manh mối (Sightings)'
      security: []
    parameters:
      -
        in: path
        name: person_id
        description: 'ID của hồ sơ người mất tích.'
        example: 1
        required: true
        schema:
          type: integer
  /api/sightings:
    post:
      summary: "Gửi manh mối mới\n* Lưu thông tin manh mối nhìn thấy người mất tích."
      operationId: giManhMiMiLuThngTinManhMiNhnThyNgiMtTch
      description: ''
      parameters: []
      responses: {  }
      tags:
        - 'Manh mối (Sightings)'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                missing_person_id:
                  type: integer
                  description: 'ID hồ sơ người mất tích.'
                  example: 1
                reported_by:
                  type: integer
                  description: 'ID người báo manh mối.'
                  example: 2
                location:
                  type: string
                  description: 'Địa điểm nhìn thấy.'
                  example: 'Công viên Tao Đàn, Quận 1'
                description:
                  type: string
                  description: 'Mô tả chi tiết (trang phục, hướng đi...).'
                  example: 'Mặc áo thun xanh.'
                sighting_date:
                  type: date
                  description: 'Ngày giờ nhìn thấy (YYYY-MM-DD).'
                  example: '2024-03-15'
              required:
                - missing_person_id
                - reported_by
                - location
                - description
                - sighting_date
  '/api/sightings/{id}':
    put:
      summary: 'Cập nhật manh mối'
      operationId: cpNhtManhMi
      description: ''
      parameters: []
      responses: {  }
      tags:
        - 'Manh mối (Sightings)'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                location:
                  type: string
                  description: 'Địa điểm mới.'
                  example: architecto
                description:
                  type: string
                  description: 'Mô tả mới.'
                  example: 'Eius et animi quos velit et.'
                sighting_date:
                  type: date
                  description: 'Ngày mới.'
                  example: architecto
    delete:
      summary: 'Xóa manh mối'
      operationId: xaManhMi
      description: ''
      parameters: []
      responses: {  }
      tags:
        - 'Manh mối (Sightings)'
    parameters:
      -
        in: path
        name: id
        description: 'ID của manh mối.'
        example: 1
        required: true
        schema:
          type: integer
  /api/missing-persons:
