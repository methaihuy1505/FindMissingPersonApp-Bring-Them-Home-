openapi: 3.0.3
info:
  title: 'Laravel API Documentation'
  description: ''
  version: 1.0.0
servers:
  -
    url: 'http://localhost:8000'
tags:
  -
    name: 'Báo cáo vi phạm'
    description: "\nAPI dành cho việc gửi và quản lý các báo cáo vi phạm liên quan đến hồ sơ."
  -
    name: 'Manh mối (Sightings)'
    description: "\nAPI quản lý các thông tin manh mối nhìn thấy người mất tích từ cộng đồng."
  -
    name: 'Quản lý hồ sơ người mất tích'
    description: '* Các API liên quan đến việc tạo, hiển thị và cập nhật hồ sơ người mất tích.'
  -
    name: 'Quản lý người dùng'
    description: "\nAPI dành cho quản trị viên quản lý danh sách người dùng và cá nhân người dùng quản lý hồ sơ."
  -
    name: 'Quản lý ảnh'
    description: "\nAPI xử lý các hình ảnh liên quan đến hồ sơ người mất tích."
  -
    name: 'Xác thực tài khoản'
    description: "\nAPI dành cho việc quản lý tài khoản người dùng, đăng ký và đăng nhập."
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Lấy token từ API <b>/login</b>, sau đó dán vào ô Authorize phía trên theo định dạng: Bearer {token}'
security:
  -
    default: []
paths:
  /api/reports:
    post:
      summary: "Gửi báo cáo\n* Người dùng gửi nội dung báo cáo vi phạm cho một hồ sơ cụ thể."
      operationId: giBoCoNgiDngGiNiDungBoCoViPhmChoMtHSCTh
      description: ''
      parameters: []
      responses: {  }
      tags:
        - 'Báo cáo vi phạm'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
                  description: 'ID người gửi báo cáo.'
                  example: 1
                missing_person_id:
                  type: integer
                  description: 'ID hồ sơ bị báo cáo.'
                  example: 5
                report_message:
                  type: string
                  description: 'Nội dung chi tiết báo cáo.'
                  example: 'Hồ sơ có chứa thông tin sai lệch.'
              required:
                - user_id
                - missing_person_id
                - report_message
    get:
      summary: "Danh sách báo cáo\n* Lấy toàn bộ danh sách báo cáo vi phạm kèm thông tin người báo và hồ sơ bị báo cáo."
      operationId: danhSchBoCoLyTonBDanhSchBoCoViPhmKmThngTinNgiBoVHSBBoCo
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  message: Unauthenticated.
                properties:
                  message:
                    type: string
                    example: Unauthenticated.
      tags:
        - 'Báo cáo vi phạm'
  '/api/reports/{id}':
    delete:
      summary: "Đóng báo cáo\n* Xóa báo cáo sau khi đã được Admin xử lý."
      operationId: ngBoCoXaBoCoSauKhicAdminXL
      description: ''
      parameters: []
      responses: {  }
      tags:
        - 'Báo cáo vi phạm'
    parameters:
      -
        in: path
        name: id
        description: 'ID của báo cáo.'
        example: 1
        required: true
        schema:
          type: integer
  '/api/sightings/{person_id}':
    get:
      summary: "Lấy manh mối theo người mất tích\n* Lấy danh sách tất cả manh mối của một hồ sơ cụ thể."
      operationId: lyManhMiTheoNgiMtTchLyDanhSchTtCManhMiCaMtHSCTh
      description: ''
      parameters: []
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 9
                    missing_person_id:
                      type: integer
                      example: 1
                    reported_by:
                      type: integer
                      example: 10
                    location:
                      type: string
                      example: test
                    description:
                      type: string
                      example: test
                    sighting_date:
                      type: string
                      example: '2026-04-01'
                    created_at:
                      type: string
                      example: '2026-03-31 10:23:05'
                    updated_at:
                      type: string
                      example: '2026-03-31 10:23:05'
                    reporter:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 10
                        name:
                          type: string
                          example: a
                        email:
                          type: string
                          example: admin@test.com
                        phone:
                          type: string
                          example: '123'
                        role:
                          type: string
                          example: admin
                        created_at:
                          type: string
                          example: '2026-03-31 08:53:17'
                        updated_at:
                          type: string
                          example: null
                          nullable: true
                example:
                  -
                    id: 9
                    missing_person_id: 1
                    reported_by: 10
                    location: test
                    description: test
                    sighting_date: '2026-04-01'
                    created_at: '2026-03-31 10:23:05'
