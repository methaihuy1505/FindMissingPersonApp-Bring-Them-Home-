      summary: "Danh sách hồ sơ\n* Lấy toàn bộ danh sách người mất tích, mặc định sắp xếp theo tin mới nhất."
      operationId: danhSchHSLyTonBDanhSchNgiMtTchMcnhSpXpTheoTinMiNht
      description: ''
      parameters:
        -
          in: query
          name: status
          description: "Lọc theo trạng thái ('missing', 'found' hoặc 'all')."
          example: missing
          required: false
          schema:
            type: string
            description: "Lọc theo trạng thái ('missing', 'found' hoặc 'all')."
            example: missing
      responses:
        200:
