    post:
      summary: "Đăng hồ sơ mới\n* Lưu thông tin người mất tích và ảnh đính kèm (nếu có)."
      operationId: ngHSMiLuThngTinNgiMtTchVnhnhKmnuC
      description: ''
      parameters: []
      responses: {  }
      tags:
        - 'Quản lý hồ sơ người mất tích'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                  description: 'Họ và tên người cần tìm.'
                  example: 'Nguyễn Văn A'
                gender:
                  type: string
                  description: 'Giới tính (male, female, other).'
                  example: male
